name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repo holen
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # System Dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev zlib1g-dev

      # 🔥 Clean Buildozer Environment (wichtig gegen AIDL Probleme)
      - name: Clean buildozer cache
        run: |
          rm -rf ~/.buildozer

      # Android SDK Installation (Buildozer compatible)
      - name: Install Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip

          mkdir -p android-sdk/cmdline-tools/latest
          mv cmdline-tools/* android-sdk/cmdline-tools/latest/

          export ANDROIDSDK=~/.buildozer/android/platform/android-sdk

          yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROIDSDK --licenses

          yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROIDSDK \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # Environment Variablen
      - name: Set environment variables
        run: |
          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDHOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

          echo "$HOME/.buildozer/android/platform/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

      # Python Dependencies
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Debug AIDL
      - name: Check AIDL
        run: |
          which aidl || true
          find ~/.buildozer -name aidl || true

      # Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
