name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Code holen
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # System dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev zlib1g-dev

      # Buildozer vorbereiten
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Android SDK installieren (Buildozer Standardpfad!)
      - name: Setup Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip

          # Struktur korrekt setzen
          mv cmdline-tools android-sdk

          # Tools verfügbar machen
          mkdir -p android-sdk/tools/bin
          ln -s ../../cmdline-tools/bin/sdkmanager android-sdk/tools/bin/sdkmanager

          export ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk

          yes | android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROIDSDK --licenses

          yes | android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROIDSDK \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # Environment setzen
      - name: Set environment variables
        run: |
          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDHOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # APK hochladen
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
