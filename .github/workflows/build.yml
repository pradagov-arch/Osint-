name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    # 🔧 System dependencies
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          pkg-config \
          m4 \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    # 🔥 Fix libffi / autotools
    - name: Fix autotools
      run: |
        echo "LIBTOOLIZE=libtoolize" >> $GITHUB_ENV

    # 🐍 Python deps
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36

    # 📱 Init buildozer (falls nicht vorhanden)
    - name: Init buildozer
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

    # 🔥 FIX: Android SDK PATH
    - name: Fix Android SDK path
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk

        echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

        echo "$SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$SDK/cmdline-tools/bin" >> $GITHUB_PATH
        echo "$SDK/tools/bin" >> $GITHUB_PATH
        echo "$SDK/platform-tools" >> $GITHUB_PATH

    # 🔥 FIX: Lizenzen akzeptieren (entscheidend!)
    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses

    # 🔥 FIX: richtige Build-Tools installieren
    - name: Install required Android build tools
      run: |
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    # 🔥 FIX: NDK Version
    - name: Force NDK 25b
      run: |
        echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV

    # 🚀 BUILD APK
    - name: Build APK
      run: |
        buildozer -v android debug

    # 📦 APK hochladen
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
