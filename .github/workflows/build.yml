name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repository holen
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Cache pip
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip

      # Cache Buildozer
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer

      # System dependencies + Android tools (inkl. AIDL)
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev zlib1g-dev \
            android-sdk \
            android-sdk-platform-tools \
            android-sdk-build-tools

      # Android environment variables
      - name: Set Android environment
        run: |
          echo "ANDROIDSDK=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # Python dependencies
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
