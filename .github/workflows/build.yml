name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04   # ⚠️ WICHTIG: nicht ubuntu-latest!

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    # 🔥 WICHTIG: richtige Tools für Buildozer/libffi
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          pkg-config \
          m4 \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    # 🔥 FIX für dein konkretes Problem
    - name: Fix autotools (libffi bug)
      run: |
        export LIBTOOLIZE=libtoolize
        echo "LIBTOOLIZE=libtoolize" >> $GITHUB_ENV

    - name: Install Python deps
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36

    # 🔥 Buildozer vorbereiten
    - name: Init buildozer (falls fehlt)
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

    # 🔥 Optional: sichere NDK Version
    - name: Force NDK 25b
      run: |
        echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV

    # 🚀 BUILD
    - name: Build APK
      run: |
        buildozer -v android debug

    # 📦 APK speichern
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
