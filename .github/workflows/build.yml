name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repository holen
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # System Dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev zlib1g-dev

      # Buildozer Cache löschen (verhindert alte SDK Fehler)
      - name: Clean Buildozer cache
        run: |
          rm -rf ~/.buildozer

      # Android SDK + sdkmanager Fix
      - name: Install Android SDK (with sdkmanager fix)
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip

          # Struktur korrekt setzen
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest

          # 🔥 WICHTIG: Symlink für Buildozer
          mkdir -p android-sdk/tools/bin
          ln -s ../../cmdline-tools/latest/bin/sdkmanager android-sdk/tools/bin/sdkmanager

          export ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk

          # Lizenzen akzeptieren
          yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROIDSDK --licenses

          # SDK Komponenten installieren (inkl. AIDL über build-tools)
          yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROIDSDK \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # Environment Variablen
      - name: Set environment variables
        run: |
          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDHOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # Python Dependencies
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Debug Check
      - name: Check sdkmanager
        run: |
          ls ~/.buildozer/android/platform/android-sdk/tools/bin || true
          which sdkmanager || true

      # Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
